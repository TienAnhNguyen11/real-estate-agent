default_filters:
  property_type: "ban-can-ho-chung-cu"
  location: "ha-noi"
  district: ""
  price_min: 3000
  price_max: 6000
  area_min: 60
  area_max: 100
  bedrooms_min: 2
  keywords:
    - "sổ hồng"
    - "có sổ"
  exclude_keywords:
    - "chưa có sổ"

scraper:
  max_pages: 3
  request_delay_min: 2
  request_delay_max: 5
  timeout: 30
  max_retries: 3

telegram:
  bot_token: "your-bot-token-here"
  admin_chat_id: "your-admin-chat-id-here"

scheduler:
  mode: "daily"       # "daily" hoặc "interval"
  daily_hour: 9       # chạy lúc 9:00 AM hàng ngày khi mode="daily"
  daily_minute: 0
  interval_minutes: 30 # dùng khi mode="interval"

database:
  path: "data/listings.db"

logging:
  level: "INFO"
  dir: "logs"
